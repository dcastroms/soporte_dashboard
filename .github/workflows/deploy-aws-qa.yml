name: Deploy - QA

on:
  push:
    paths:
      - "src/**"
      - "public/**"
      - "server/**"
      - "serverless.yml"
      - "next.config.ts"
      - "package.json"
      - "package-lock.json"
      - "scripts/**"
      - ".github/workflows/deploy-aws-qa.yml"
    branches:
      - qa

jobs:
  buildAndDeploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Deploy to AWS (QA)
        env:
          CI: "true"
          DATABASE_PROXY_URL: soporte-mongodb-qa-proxy
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL_QA }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID_DEV }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET_DEV }}
          INTERCOM_TOKEN: ${{ secrets.INTERCOM_TOKEN }}
          INTERCOM_CLIENT_SECRET: ${{ secrets.INTERCOM_CLIENT_SECRET }}
          INTERCOM_APP_ID: ${{ secrets.INTERCOM_APP_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          AWS_SES_FROM_EMAIL: ${{ secrets.AWS_SES_FROM_EMAIL }}
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OLLAMA_URL: ${{ secrets.OLLAMA_URL }}
        run: npm run deploy:server:qa
